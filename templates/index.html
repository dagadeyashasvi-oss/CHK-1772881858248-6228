<!DOCTYPE html>
<html>

<head>

<title>FoodLink AI</title>

<link rel="stylesheet" href="/static/style.css">

<!-- EmailJS library -->
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>
(function(){
emailjs.init("F1Lw3sRiILLlptMjq");
})();
</script>

</head>

<body>

<div class="main-container">

<div class="card">

<h1>Food Donation Form</h1>

<p class="subtitle">ONE DONATION CAN FEED MANY LIVES.</p>

<form action="/submit" method="POST" onsubmit="sendEmail(event)">

<input type="text" name="event_name" placeholder="Event Name" required>

<input type="text" name="city" placeholder="City" required>

<input type="text" name="event_place" placeholder="Event Place" required>

<input type="text" name="contact" placeholder="Contact Number" required>

<input type="text" name="food_type" placeholder="Food Type" required>

<input type="text" name="quantity" placeholder="Quantity (plates)" required>

<input type="text" name="expiry" placeholder="Food Expiry (hours)" required>

<input type="hidden" name="latitude" id="lat">
<input type="hidden" name="longitude" id="lon">

<div class="buttons">

<button type="button" class="location-btn" onclick="getLocation()">
📍 Get Live Location
</button>

<button type="submit" class="submit-btn">
Donate Food
</button>

</div>

</form>

</div>

</div>

<script>

/* GPS Location */

function getLocation(){

navigator.geolocation.getCurrentPosition(function(position){

document.getElementById("lat").value = position.coords.latitude;
document.getElementById("lon").value = position.coords.longitude;

alert("Location Captured Successfully");

});

}


/* EmailJS Send Email */

function sendEmail(event){

event.preventDefault();

var params = {

event_name: document.getElementsByName("event_name")[0].value,
city: document.getElementsByName("city")[0].value,
event_place: document.getElementsByName("event_place")[0].value,
contact: document.getElementsByName("contact")[0].value,
food_type: document.getElementsByName("food_type")[0].value,
quantity: document.getElementsByName("quantity")[0].value,
expiry: document.getElementsByName("expiry")[0].value,
latitude: document.getElementById("lat").value,
longitude: document.getElementById("lon").value

};

emailjs.send("service_n6xmw8k","template_w8k1xw8",params)

.then(function(){

alert("Email sent to NGO successfully");

document.querySelector("form").submit();

})

.catch(function(error){

console.log("Email failed",error);

});

}

</script>

</body>
</html>
