<!DOCTYPE html>
<html>

<head>

<title>NGO Dashboard</title>
<link rel="stylesheet" href="/static/style.css">

</head>

<body>

<h1>Available Food</h1>

<table>

<th>City</th>
<th>Place</th>

<th>Food</th>

</tr>

<tr>

<td>{{row[1]}}</td>
<td>{{row[2]}}</td>
<td>{{row[3]}}</td>
<td>{{row[4]}}</td>

<a target="_blank"
href="https://www.google.com/maps?q={{row[8]}},{{row[9]}}">

</a>

</td>

</tr>

{% endfor %}

</table>

</body>
</html>
