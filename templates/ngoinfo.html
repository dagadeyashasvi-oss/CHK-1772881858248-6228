<!DOCTYPE html>
<html>

<head>
<title>NGO Dashboard - FoodLink AI</title>

<style>

body{
font-family: Arial;
background-color:#f5f5f5;
text-align:center;
}

h2{
color:#2c3e50;
}

table{
margin:auto;
border-collapse:collapse;
width:90%;
background:white;
}

th,td{
padding:12px;
border:1px solid #ccc;
}

th{
background-color:#2ecc71;
color:white;
}

tr:hover{
background:#f2f2f2;
}

</style>

</head>

<body>

<h2>Available Food Donations</h2>

<table>

<tr>
<th>Event Place</th>
<th>Location</th>
<th>City</th>
<th>Food Type</th>
<th>Quantity</th>
<th>Spoilage Time</th>
</tr>

{% for row in data %}

<tr>

<td>{{row[1]}}</td>
<td>{{row[2]}}</td>
<td>{{row[3]}}</td>
<td>{{row[4]}}</td>
<td>{{row[5]}}</td>
<td>{{row[6]}}</td>

</tr>

{% endfor %}

</table>

</body>
</html>
